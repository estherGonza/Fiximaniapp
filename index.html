<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiximania</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contenedor">

        <h1>¡Hola!</h1>

        <img src="logopaginaweb.png" alt="Logo Fiximania" class="logo">

        <p class="descripcion">
            Descarga la aplicación oficial de Fiximania y accede a todas sus funciones desde tu dispositivo móvil.
        </p>

        <a href="Fiximania.apk"
           download="Fiximania.apk"
           class="btn-descarga"
           id="btnDescarga">
            Descargar aplicación
        </a>

    </div>

    <script>
    // --- NUEVA LÓGICA: DETECCIÓN DE DEEP LINK AL CARGAR LA PÁGINA ---
    window.onload = function() {
        // 1. Detectar si el usuario está en un dispositivo móvil
        const esMovil = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        if (esMovil) {
            // 2. Extraer el ID del tutorial desde la URL de la web (ejemplo: tuweb.com/?id=TU_ID)
            const parametrosUrl = new URLSearchParams(window.location.search);
            const tutorialId = parametrosUrl.get('id');

            // Solo actuamos si la URL de la web contiene un ID de tutorial válido
            if (tutorialId && tutorialId !== 'abrir') {
                // Construir el esquema personalizado que tu App ya sabe escuchar
                const esquemaApp = "fiximania://tutorial/" + tutorialId.trim();

                // Intentar abrir la app directamente
                window.location.href = esquemaApp;
                
                console.log("Intentando desviar al tutorial en la App: " + esquemaApp);
            }
        }
    };

    // --- TU CÓDIGO ORIGINAL (SIN MODIFICACIONES) ---
    document.getElementById("btnDescarga").addEventListener("click", function () {
        // Solo iniciamos la descarga, no intentamos abrir un tutorial inexistente
        alert("Iniciando descarga de la App Fiximania...");
        window.location.href = "Fiximania.apk"; 
    });
</script>

</body>
</html>
