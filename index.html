<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiximania</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contenedor">

        <h1>¡Hola!</h1>

        <img src="logopaginaweb.png" alt="Logo Fiximania" class="logo">

        <p class="descripcion">
            Descarga la aplicación oficial de Fiximania y accede a todas sus funciones desde tu dispositivo móvil.
        </p>

        <a href="Fiximania.apk"
           download="Fiximania.apk"
           class="btn-descarga"
           id="btnDescarga">
            Descargar aplicación
        </a>

    </div>

<script>
    // --- DETECCIÓN AUTOMÁTICA E INVISIBLE AL CARGAR LA PÁGINA ---
    window.onload = function() {
        const esMovil = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        if (esMovil) {
            const parametrosUrl = new URLSearchParams(window.location.search);
            const tutorialId = parametrosUrl.get('id');

            if (tutorialId && tutorialId !== 'abrir') {
                const esquemaApp = "fiximania://tutorial/" + tutorialId.trim();

                // Intentar abrir la aplicación automáticamente de inmediato
                window.location.href = esquemaApp;

                // RESPALDO INVISIBLE: Si en 1.5 segundos la app no se abre (porque no está instalada),
                // el navegador se quedará en la web de forma fluida para que descarguen el APK.
                setTimeout(function() {
                    console.log("Detección completada: Permanecer en la web para descarga.");
                }, 1500);
            }
        }
    };

    // --- TU CÓDIGO ORIGINAL DE DESCARGA (INTACTO) ---
    document.getElementById("btnDescarga").addEventListener("click", function () {
        alert("Iniciando descarga de la App Fiximania...");
        window.location.href = "Fiximania.apk"; 
    });
</script>

</body>
</html>
