<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiximania</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contenedor">

        <h1>¡Hola!</h1>

        <img src="logopaginaweb.png" alt="Logo Fiximania" class="logo">

        <p class="descripcion">
            Descarga la aplicación oficial de Fiximania y accede a todas sus funciones desde tu dispositivo móvil.
        </p>

        <a href="Fiximania.apk"

    <script>

    });
</script>
